# .mint.toml — mint configuration. Only keys that DIFFER from mint's compiled
# defaults are set here; everything else uses mint's built-in defaults.

# Tooling/workflow artifacts (tracked but not shipped product source) — kept out
# of the AI notes/commit diff so release notes describe the CLI, not workflow
# specs, agent definitions, or task-tracking state.
diff_exclude = [
    '.workflows/**',  # workflow specs/plans/knowledge (333 tracked files)
    '.claude/**',     # Claude Code agents, skills, settings (397 tracked files)
    '.agntc/**',      # agent tooling manifest
    '.tick/**',       # task-tracking state
]

[release.hooks]
# Gate the release on a clean-install build + test BEFORE the tag PONR. npm
# publish (.github/workflows/publish.yml) only runs AFTER the tag is pushed, so
# without this a broken build/test would leave an orphaned tag + GitHub release.
# Mirrors the CI job exactly (clean install included).
pre_tag = ['npm ci', 'npm run build', 'npm test']
